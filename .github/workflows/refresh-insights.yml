name: Refresh insights data

# Daily re-query of the live submissions table → src/data/insights.generated.json.
# Commits only when the numbers change, which pushes to main and triggers a
# Vercel redeploy so /insights (and the footer date) stay current.

on:
  schedule:
    - cron: "17 6 * * *" # ~06:17 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-insights
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Regenerate aggregates
        run: node scripts/refresh-seed.mjs
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      - name: Commit if changed
        run: |
          if git diff --quiet -- src/data/insights.generated.json; then
            echo "No change in aggregates — nothing to commit."
          else
            git config user.name "insights-refresh[bot]"
            git config user.email "actions@users.noreply.github.com"
            git add src/data/insights.generated.json
            git commit -m "chore: daily insights refresh"
            git push
          fi
